<!DOCTYPE html>
<html>
<head>
  <title>Fleet Compliance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background: #0b5ed7;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #094db1;
    }

    .list-item {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      font-size: 12px;
      margin-right: 6px;
      margin-top: 4px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Fleet Compliance Reminder</h1>

    <div class="card">
      <h2>Register Master Data</h2>
      <div class="grid">
        <div>
          <h3>Add Driver</h3>
          <input id="newDriver" placeholder="Enter driver name" />
          <button onclick="addDriver()">Save Driver</button>
        </div>

        <div>
          <h3>Add Truck</h3>
          <input id="newTruck" placeholder="Enter truck / fleet number" />
          <button onclick="addTruck()">Save Truck</button>
        </div>

        <div>
          <h3>Add Trailer</h3>
          <input id="newTrailer" placeholder="Enter trailer number" />
          <button onclick="addTrailer()">Save Trailer</button>
        </div>

        <div>
          <h3>Add Company Name</h3>
          <input id="newCompany" placeholder="Enter company name" />
          <button onclick="addCompany()">Save Company</button>
        </div>

        <div>
          <h3>Add Document Type</h3>
          <input id="newDocType" placeholder="Enter document type" />
          <button onclick="addDocumentType()">Save Document Type</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Add Compliance Document</h2>

      <label>Document Owner Type</label>
      <select id="ownerType" onchange="updateOwnerDropdown()">
        <option value="">Select Owner Type</option>
        <option value="Driver">Driver</option>
        <option value="Truck">Truck</option>
        <option value="Trailer">Trailer</option>
        <option value="Company">Company</option>
      </select>

      <div id="driverBlock" class="hidden">
        <label>Select Driver</label>
        <select id="driverSelect"></select>
      </div>

      <div id="truckBlock" class="hidden">
        <label>Select Truck</label>
        <select id="truckSelect"></select>
      </div>

      <div id="trailerBlock" class="hidden">
        <label>Select Trailer</label>
        <select id="trailerSelect"></select>
      </div>

      <div id="companyBlock" class="hidden">
        <label>Select Company</label>
        <select id="companySelect"></select>
      </div>

      <label>Document Type</label>
      <select id="docTypeSelect"></select>

      <label>Or type a new document type</label>
      <input id="customDocType" placeholder="Example: Fire Training Certificate" />

      <label>Expiry Date</label>
      <input id="date" type="date" />

      <label>Reminder Email</label>
      <input id="email" type="email" placeholder="Reminder Email" />

      <label>Upload Document</label>
      <input id="file" type="file" />

      <button onclick="saveDocument()">Save Document</button>
    </div>

    <div class="card">
      <h2>Master Lists</h2>
      <div class="grid">
        <div>
          <h3>Drivers</h3>
          <div id="driversList"></div>
        </div>
        <div>
          <h3>Trucks</h3>
          <div id="trucksList"></div>
        </div>
        <div>
          <h3>Trailers</h3>
          <div id="trailersList"></div>
        </div>
        <div>
          <h3>Companies</h3>
          <div id="companiesList"></div>
        </div>
        <div>
          <h3>Document Types</h3>
          <div id="docTypesList"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Saved Documents</h2>
      <div id="documentsList"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyASAVnDUNW-zFqsacRXbsomiueMlgAXoU8",
      authDomain: "fleet-compliance-app.firebaseapp.com",
      projectId: "fleet-compliance-app",
      storageBucket: "fleet-compliance-app.firebasestorage.app",
      messagingSenderId: "839373661347",
      appId: "1:839373661347:web:c6704a138194e2b17a0b16"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let drivers = [];
    let trucks = [];
    let trailers = [];
    let companies = [];
    let documentTypes = [];
    let documents = [];

    function sortByField(arr, field) {
      return arr.sort((a, b) => (a[field] || "").localeCompare(b[field] || ""));
    }

    function getStatusInfo(dateString) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const expiry = new Date(dateString);
      expiry.setHours(0, 0, 0, 0);

      const diffDays = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));

      if (diffDays < 0) return { text: "❌ EXPIRED", color: "red" };
      if (diffDays === 0) return { text: "⚠️ EXPIRES TODAY", color: "orange" };
      if (diffDays === 1) return { text: "⚠️ DUE TOMORROW", color: "orange" };
      if (diffDays <= 7) return { text: "⚠️ DUE IN 7 DAYS", color: "darkorange" };
      if (diffDays <= 30) return { text: "⚠️ DUE IN 30 DAYS", color: "goldenrod" };
      return { text: "✅ VALID", color: "green" };
    }

    async function loadDrivers() {
      const snap = await getDocs(collection(db, "drivers"));
      drivers = [];
      snap.forEach((d) => drivers.push({ id: d.id, ...d.data() }));
      sortByField(drivers, "name");
      renderDrivers();
      renderDriverDropdown();
    }

    async function loadTrucks() {
      const snap = await getDocs(collection(db, "trucks"));
      trucks = [];
      snap.forEach((d) => trucks.push({ id: d.id, ...d.data() }));
      sortByField(trucks, "fleetNumber");
      renderTrucks();
      renderTruckDropdown();
    }

    async function loadTrailers() {
      const snap = await getDocs(collection(db, "trailers"));
      trailers = [];
      snap.forEach((d) => trailers.push({ id: d.id, ...d.data() }));
      sortByField(trailers, "trailerNumber");
      renderTrailers();
      renderTrailerDropdown();
    }

    async function loadCompanies() {
      const snap = await getDocs(collection(db, "companies"));
      companies = [];
      snap.forEach((d) => companies.push({ id: d.id, ...d.data() }));
      sortByField(companies, "name");
      renderCompanies();
      renderCompanyDropdown();
    }

    async function loadDocumentTypes() {
      const snap = await getDocs(collection(db, "documentTypes"));
      documentTypes = [];
      snap.forEach((d) => documentTypes.push({ id: d.id, ...d.data() }));
      sortByField(documentTypes, "name");
      renderDocumentTypes();
      renderDocumentTypeDropdown();
    }

    async function loadDocuments() {
      const snap = await getDocs(collection(db, "documents"));
      documents = [];
      snap.forEach((d) => documents.push({ id: d.id, ...d.data() }));
      documents.sort((a, b) => (a.ownerName || "").localeCompare(b.ownerName || ""));
      renderDocuments();
    }

    function renderDriverDropdown() {
      const select = document.getElementById("driverSelect");
      select.innerHTML = `<option value="">Select Driver</option>`;
      drivers.forEach((item) => {
        select.innerHTML += `<option value="${item.name}">${item.name}</option>`;
      });
    }

    function renderTruckDropdown() {
      const select = document.getElementById("truckSelect");
      select.innerHTML = `<option value="">Select Truck</option>`;
      trucks.forEach((item) => {
        select.innerHTML += `<option value="${item.fleetNumber}">${item.fleetNumber}</option>`;
      });
    }

    function renderTrailerDropdown() {
      const select = document.getElementById("trailerSelect");
      select.innerHTML = `<option value="">Select Trailer</option>`;
      trailers.forEach((item) => {
        select.innerHTML += `<option value="${item.trailerNumber}">${item.trailerNumber}</option>`;
      });
    }

    function renderCompanyDropdown() {
      const select = document.getElementById("companySelect");
      select.innerHTML = `<option value="">Select Company</option>`;
      companies.forEach((item) => {
        select.innerHTML += `<option value="${item.name}">${item.name}</option>`;
      });
    }

    function renderDocumentTypeDropdown() {
      const select = document.getElementById("docTypeSelect");
      select.innerHTML = `<option value="">Select Document Type</option>`;
      documentTypes.forEach((item) => {
        select.innerHTML += `<option value="${item.name}">${item.name}</option>`;
      });
    }

    function renderDrivers() {
      const box = document.getElementById("driversList");
      box.innerHTML = drivers.length
        ? drivers.map(item => `<div class="list-item">${item.name}</div>`).join("")
        : `<div class="small">No drivers saved yet.</div>`;
    }

    function renderTrucks() {
      const box = document.getElementById("trucksList");
      box.innerHTML = trucks.length
        ? trucks.map(item => `<div class="list-item">${item.fleetNumber}</div>`).join("")
        : `<div class="small">No trucks saved yet.</div>`;
    }

    function renderTrailers() {
      const box = document.getElementById("trailersList");
      box.innerHTML = trailers.length
        ? trailers.map(item => `<div class="list-item">${item.trailerNumber}</div>`).join("")
        : `<div class="small">No trailers saved yet.</div>`;
    }

    function renderCompanies() {
      const box = document.getElementById("companiesList");
      box.innerHTML = companies.length
        ? companies.map(item => `<div class="list-item">${item.name}</div>`).join("")
        : `<div class="small">No companies saved yet.</div>`;
    }

    function renderDocumentTypes() {
      const box = document.getElementById("docTypesList");
      box.innerHTML = documentTypes.length
        ? documentTypes.map(item => `<div class="list-item">${item.name}</div>`).join("")
        : `<div class="small">No document types saved yet.</div>`;
    }

    function renderDocuments() {
      const box = document.getElementById("documentsList");
      if (!documents.length) {
        box.innerHTML = `<div class="small">No documents saved yet.</div>`;
        return;
      }

      box.innerHTML = documents.map((item) => {
        const status = getStatusInfo(item.date);
        return `
          <div class="list-item">
            <div style="font-weight:bold; color:${status.color}">
              [${item.ownerType}] ${item.ownerName} - ${item.documentType} (${status.text})
            </div>
            <div class="small">
              <span class="pill">Expiry: ${item.date}</span>
              <span class="pill">Owner Type: ${item.ownerType}</span>
            </div>
            <div class="small">Reminder Email: ${item.email || ""}</div>
            ${item.imageUrl ? `<div><a href="${item.imageUrl}" target="_blank">View Document</a></div>` : ""}
          </div>
        `;
      }).join("");
    }

    function hideAllOwnerBlocks() {
      document.getElementById("driverBlock").classList.add("hidden");
      document.getElementById("truckBlock").classList.add("hidden");
      document.getElementById("trailerBlock").classList.add("hidden");
      document.getElementById("companyBlock").classList.add("hidden");
    }

    window.updateOwnerDropdown = function () {
      const ownerType = document.getElementById("ownerType").value;
      hideAllOwnerBlocks();

      if (ownerType === "Driver") {
        document.getElementById("driverBlock").classList.remove("hidden");
      } else if (ownerType === "Truck") {
        document.getElementById("truckBlock").classList.remove("hidden");
      } else if (ownerType === "Trailer") {
        document.getElementById("trailerBlock").classList.remove("hidden");
      } else if (ownerType === "Company") {
        document.getElementById("companyBlock").classList.remove("hidden");
      }
    };

    async function addIfNotExists(collectionName, fieldName, value, cacheArray, cacheField) {
      const trimmed = value.trim();
      if (!trimmed) return;

      const exists = cacheArray.some(item =>
        (item[cacheField] || "").toLowerCase() === trimmed.toLowerCase()
      );

      if (!exists) {
        await addDoc(collection(db, collectionName), {
          [fieldName]: trimmed,
          created: new Date().toISOString()
        });
      }
    }

    window.addDriver = async function () {
      const value = document.getElementById("newDriver").value.trim();
      if (!value) {
        alert("Please enter a driver name.");
        return;
      }

      await addIfNotExists("drivers", "name", value, drivers, "name");
      document.getElementById("newDriver").value = "";
      await loadDrivers();
      alert("Driver saved.");
    };

    window.addTruck = async function () {
      const value = document.getElementById("newTruck").value.trim();
      if (!value) {
        alert("Please enter a truck number.");
        return;
      }

      await addIfNotExists("trucks", "fleetNumber", value, trucks, "fleetNumber");
      document.getElementById("newTruck").value = "";
      await loadTrucks();
      alert("Truck saved.");
    };

    window.addTrailer = async function () {
      const value = document.getElementById("newTrailer").value.trim();
      if (!value) {
        alert("Please enter a trailer number.");
        return;
      }

      await addIfNotExists("trailers", "trailerNumber", value, trailers, "trailerNumber");
      document.getElementById("newTrailer").value = "";
      await loadTrailers();
      alert("Trailer saved.");
    };

    window.addCompany = async function () {
      const value = document.getElementById("newCompany").value.trim();
      if (!value) {
        alert("Please enter a company name.");
        return;
      }

      await addIfNotExists("companies", "name", value, companies, "name");
      document.getElementById("newCompany").value = "";
      await loadCompanies();
      alert("Company saved.");
    };

    window.addDocumentType = async function () {
      const value = document.getElementById("newDocType").value.trim();
      if (!value) {
        alert("Please enter a document type.");
        return;
      }

      await addIfNotExists("documentTypes", "name", value, documentTypes, "name");
      document.getElementById("newDocType").value = "";
      await loadDocumentTypes();
      alert("Document type saved.");
    };

    function getOwnerNameByType(ownerType) {
      if (ownerType === "Driver") return document.getElementById("driverSelect").value;
      if (ownerType === "Truck") return document.getElementById("truckSelect").value;
      if (ownerType === "Trailer") return document.getElementById("trailerSelect").value;
      if (ownerType === "Company") return document.getElementById("companySelect").value;
      return "";
    }

    window.saveDocument = async function () {
      try {
        const ownerType = document.getElementById("ownerType").value;
        const ownerName = getOwnerNameByType(ownerType);
        const selectedDocType = document.getElementById("docTypeSelect").value;
        const customDocType = document.getElementById("customDocType").value.trim();
        const documentType = customDocType || selectedDocType;
        const date = document.getElementById("date").value;
        const email = document.getElementById("email").value.trim();
        const file = document.getElementById("file").files[0];

        if (!ownerType || !ownerName || !documentType || !date || !email) {
          alert("Please select owner type, owner, document type, expiry date, and reminder email.");
          return;
        }

        if (customDocType) {
          await addIfNotExists("documentTypes", "name", customDocType, documentTypes, "name");
          await loadDocumentTypes();
        }

        let imageUrl = "";

        if (file) {
          const storageRef = ref(storage, "documents/" + Date.now() + "-" + file.name);
          await uploadBytes(storageRef, file);
          imageUrl = await getDownloadURL(storageRef);
        }

        await addDoc(collection(db, "documents"), {
          ownerType,
          ownerName,
          documentType,
          date,
          email,
          imageUrl,
          created: new Date().toISOString()
        });

        document.getElementById("ownerType").value = "";
        document.getElementById("driverSelect").value = "";
        document.getElementById("truckSelect").value = "";
        document.getElementById("trailerSelect").value = "";
        document.getElementById("companySelect").value = "";
        document.getElementById("docTypeSelect").value = "";
        document.getElementById("customDocType").value = "";
        document.getElementById("date").value = "";
        document.getElementById("email").value = "";
        document.getElementById("file").value = "";
        hideAllOwnerBlocks();

        await loadDocuments();
        alert("Document saved.");
      } catch (error) {
        console.error(error);
        alert("Save failed. Please try again.");
      }
    };

    async function init() {
      await loadDrivers();
      await loadTrucks();
      await loadTrailers();
      await loadCompanies();
      await loadDocumentTypes();
      await loadDocuments();
      hideAllOwnerBlocks();
    }

    init();
  </script>
</body>
</html>
