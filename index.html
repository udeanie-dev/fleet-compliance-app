<!DOCTYPE html>
<html>
<head>
  <title>Fleet Compliance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; padding: 20px;">

<h1>Fleet Compliance Reminder</h1>

<h3>Add Document</h3>
<input id="name" placeholder="Driver / Vehicle" /><br><br>
<input id="doc" placeholder="Document Type" /><br><br>
<input id="date" type="date" /><br><br>

<button onclick="addDoc()">Save</button>

<h3>Documents</h3>
<ul id="list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyASAVnDUNW-zFqsacRXbsomiueMlgAXoU8",
  authDomain: "fleet-compliance-app.firebaseapp.com",
  projectId: "fleet-compliance-app",
  storageBucket: "fleet-compliance-app.firebasestorage.app",
  messagingSenderId: "839373661347",
  appId: "1:839373661347:web:c6704a138194e2b17a0b16"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addDoc = async function () {
  const name = document.getElementById("name").value;
  const doc = document.getElementById("doc").value;
  const date = document.getElementById("date").value;

  await addDoc(collection(db, "documents"), {
    name,
    doc,
    date,
    created: new Date()
  });

  loadDocs();
};

async function loadDocs() {
  const querySnapshot = await getDocs(collection(db, "documents"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    const li = document.createElement("li");
    li.innerText = data.name + " - " + data.doc + " - Expiry: " + data.date;
    list.appendChild(li);
  });
}

loadDocs();
</script>

</body>
</html>
